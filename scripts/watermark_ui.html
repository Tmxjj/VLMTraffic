<!DOCTYPE html>
<html>
<head>
    <title>Watermark Tuning (数字水印调参工具)</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        #sidebar { width: 380px; background: #f0f0f0; padding: 20px; box-sizing: border-box; overflow-y: auto; height: 100%; border-right: 1px solid #ccc; }
        #main { flex-grow: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #333; overflow: hidden; }
        canvas { border: 1px solid black; cursor: crosshair; }
        .control-group { margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .control-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #0056b3; }
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        .input-row span { font-size: 12px; width: 130px; }
        .input-row input[type=range] { flex-grow: 1; margin: 0 10px; }
        .input-row .val { width: 40px; text-align: right; font-size: 12px; }
        #configOutput { width: 100%; height: 200px; font-family: monospace; font-size: 10px; margin-top: 20px; white-space: pre-wrap; background: #fff; padding: 5px; box-sizing: border-box; }
        #imageUpload { margin-bottom: 15px; }
        #approachSelect { width: 100%; padding: 5px; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Watermark Tuner (水印调参工具)</h3>
        <!-- 上传测试图像源文件 -->
        <input type="file" id="imageUpload" accept="image/*">

        <div class="control-group" id="sceneSelector">
            <label style="color: black;">Scene Preset (选择场景预设)</label>
            <select id="presetSelect" style="width: 100%; padding: 5px;">
                <option value="4_WAY_RHT_3LANE">4_WAY_RHT_3LANE (JiNan, NY)</option>
                <option value="T_JUNCTION_RHT_2LANE">T_JUNCTION_RHT_2LANE (France)</option>
                <option value="SONGDO_4WAY_RHT_ASYM">SONGDO_4WAY_RHT_ASYM (Songdo)</option>
                <option value="YMT_4WAY_LHT_3LANE">YMT_4WAY_LHT_3LANE (Hongkong)</option>
            </select>
            <label style="color: black; margin-top: 8px;">Approach (选择方向)</label>
            <select id="approachSelect"></select>
        </div>

        <div id="controlsContainer"></div>
        <!-- 触发写入到 python 的后台接口 -->
        <button id="saveBtn" style="margin-top: 10px; width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold;">Save to add_lane_watermarks.py (保存到脚本)</button>
        <p style="font-size: 11px; color: #666; margin-top: 10px;">Tip: Use sliders to adjust, or drag the numbers directly on the canvas to move their offset. Rotate the numbers to align with the lanes. (提示: 支持拖动调节 X/Y 偏移以及手动滑块调节，可同时旋转整个水印组)</p>
    </div>

    <div id="main">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let img = new Image();
        let W = 0, H = 0;
        const sliderValueMap = new Map();

        let presets = {};
        let currentScenario = "4_WAY_RHT_3LANE";
        let currentConfig = null;
        let currentApproach = null;

        let autoSaveTimer = null;
        function scheduleAutoSave() {
            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(async () => {
                try {
                    await fetch('/api/save_config', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ config_key: currentScenario, config: currentConfig })
                    });
                    const btn = document.getElementById('saveBtn');
                    btn.textContent = "Saved";
                    setTimeout(() => btn.textContent = "Save to add_lane_watermarks.py (保存到脚本)", 1000);
                } catch(e) {}
            }, 300);
        }

        async function initConfig() {
            try {
                const res = await fetch('/api/get_config');
                presets = await res.json();
            } catch(e) {
                console.error(e);
            }
            updateSceneSelector();
        }

        function updateSceneSelector() {
            const select = document.getElementById('presetSelect');
            select.innerHTML = '';
            for (const key in presets) {
                const opt = document.createElement('option');
                opt.value = key;
                opt.textContent = key;
                select.appendChild(opt);
            }
            if (presets[currentScenario]) {
                select.value = currentScenario;
            } else if (Object.keys(presets).length > 0) {
                currentScenario = Object.keys(presets)[0];
                select.value = currentScenario;
            }
            loadScenarioConfig();
        }

        function updateApproachSelector() {
            const select = document.getElementById('approachSelect');
            select.innerHTML = '';
            if (!currentConfig) return;
            const approaches = Object.keys(currentConfig);
            for (const ap of approaches) {
                const opt = document.createElement('option');
                opt.value = ap;
                opt.textContent = ap;
                select.appendChild(opt);
            }
            // 保留已选方向，若不存在则选第一个
            if (currentApproach && approaches.includes(currentApproach)) {
                select.value = currentApproach;
            } else {
                currentApproach = approaches[0] || null;
                if (currentApproach) select.value = currentApproach;
            }
        }

        function loadScenarioConfig() {
            if (presets[currentScenario]) {
                currentConfig = JSON.parse(JSON.stringify(presets[currentScenario]));
            } else {
                currentConfig = {};
            }
            // 切换场景时重置方向选择
            currentApproach = Object.keys(currentConfig)[0] || null;
            updateApproachSelector();
            buildControls();
            draw();
        }

        initConfig();

        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    img.onload = function() {
                        W = img.width; H = img.height;
                        canvas.width = W; canvas.height = H;
                        draw();
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('presetSelect').addEventListener('change', function(e) {
            currentScenario = e.target.value;
            loadScenarioConfig();
        });

        document.getElementById('approachSelect').addEventListener('change', function(e) {
            currentApproach = e.target.value;
            buildControls();
            draw();
        });

        function formatValue(param, value) {
            if (param === 'text_rotation') {
                return String(Math.round(value));
            }
            return Number(value).toFixed(6);
        }

        function createSlider(container, label, value, min, max, step, param, approach) {
            const row = document.createElement('div');
            row.className = 'input-row';
            const lbl = document.createElement('span'); lbl.textContent = label;
            const input = document.createElement('input');
            input.type = 'range'; input.min = min; input.max = max; input.step = step; input.value = value;
            const valSpan = document.createElement('span');
            valSpan.className = 'val';
            valSpan.textContent = formatValue(param, value);

            input.oninput = function() {
                currentConfig[approach][param] = parseFloat(this.value);
                valSpan.textContent = formatValue(param, parseFloat(this.value));
                draw();
                scheduleAutoSave();
            };

            const sliderId = approach + '_' + param;
            input.id = sliderId;
            sliderValueMap.set(sliderId, valSpan);

            row.appendChild(lbl); row.appendChild(input); row.appendChild(valSpan);
            container.appendChild(row);
        }

        function buildControls() {
            const container = document.getElementById('controlsContainer');
            container.innerHTML = '';
            if (!currentConfig || !currentApproach) return;

            const approach = currentApproach;
            const cfg = currentConfig[approach];
            if (!cfg) return;

            const div = document.createElement('div');
            div.className = 'control-group';
            div.innerHTML = `<label>${approach}</label>`;

            createSlider(div, 'lane_w_ratio', cfg.lane_w_ratio || 0.05, 0.005, 0.2, 0.001, 'lane_w_ratio', approach);
            createSlider(div, 'x_offset_ratio', cfg.x_offset_ratio || 0, -0.5, 0.5, 0.001, 'x_offset_ratio', approach);
            createSlider(div, 'y_offset_ratio', cfg.y_offset_ratio || 0, -0.5, 0.5, 0.001, 'y_offset_ratio', approach);
            createSlider(div, 'text_rotation (°)', cfg.text_rotation || 0, -180, 180, 1, 'text_rotation', approach);
            createSlider(div, 'text_pos_x', cfg.text_pos_x || 0.5, 0, 1, 0.001, 'text_pos_x', approach);
            createSlider(div, 'text_pos_y', cfg.text_pos_y || 0.05, 0, 1, 0.001, 'text_pos_y', approach);
            createSlider(div, 'lane_font_size_ratio', cfg.lane_font_size_ratio || 0.05, 0.01, 0.2, 0.001, 'lane_font_size_ratio', approach);
            createSlider(div, 'text_font_size_ratio', cfg.text_font_size_ratio || 0.05, 0.01, 0.2, 0.001, 'text_font_size_ratio', approach);

            container.appendChild(div);
        }

        let dragTarget = null;
        let startScaleX = 0, startScaleY = 0;
        let startOffXs = 0, startOffYs = 0;

        canvas.addEventListener('mousedown', function(e) {
            if (!W || !currentConfig || !currentApproach) return;
            dragTarget = null;
            const rect   = canvas.getBoundingClientRect();
            const scaleX = canvas.width  / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top)  * scaleY;

            const Cx = W / 2.0, Cy = H / 2.0;
            const approach = currentApproach;
            const cfg = currentConfig[approach];
            if (!cfg) return;

            // Group center
            const gx = Cx + W * (cfg.x_offset_ratio || 0);
            const gy = Cy + H * (cfg.y_offset_ratio || 0);
            const d_group = Math.hypot(gx - mouseX, gy - mouseY);

            // Text center
            const tx = W * (cfg.text_pos_x || 0.5);
            const ty = H * (cfg.text_pos_y || 0.05);
            const d_text = Math.hypot(tx - mouseX, ty - mouseY);

            const threshold = Math.max(40, W * 0.06);

            if (d_group < threshold && d_group <= d_text) {
                dragTarget = "group";
                startScaleX = mouseX; startScaleY = mouseY;
                startOffXs = cfg.x_offset_ratio || 0;
                startOffYs = cfg.y_offset_ratio || 0;
            } else if (d_text < threshold) {
                dragTarget = "text";
                startScaleX = mouseX; startScaleY = mouseY;
                startOffXs = cfg.text_pos_x || 0.5;
                startOffYs = cfg.text_pos_y || 0.05;
            }
        });

        canvas.addEventListener('mousemove', function(e) {
            if (!dragTarget || !currentConfig || !currentApproach) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;

            const dx = (mouseX - startScaleX) / W;
            const dy = (mouseY - startScaleY) / H;

            const nextX = startOffXs + dx;
            const nextY = startOffYs + dy;
            const approach = currentApproach;

            if (dragTarget === "group") {
                currentConfig[approach].x_offset_ratio = nextX;
                currentConfig[approach].y_offset_ratio = nextY;

                const dxSlider = document.getElementById(approach + '_x_offset_ratio');
                const dySlider = document.getElementById(approach + '_y_offset_ratio');
                if(dxSlider) {
                    dxSlider.value = nextX;
                    const valSpan = sliderValueMap.get(dxSlider.id);
                    if (valSpan) valSpan.textContent = formatValue('x_offset_ratio', nextX);
                }
                if(dySlider) {
                    dySlider.value = nextY;
                    const valSpan = sliderValueMap.get(dySlider.id);
                    if (valSpan) valSpan.textContent = formatValue('y_offset_ratio', nextY);
                }
            } else if (dragTarget === "text") {
                currentConfig[approach].text_pos_x = nextX;
                currentConfig[approach].text_pos_y = nextY;

                const dxSlider = document.getElementById(approach + '_text_pos_x');
                const dySlider = document.getElementById(approach + '_text_pos_y');
                if(dxSlider) {
                    dxSlider.value = nextX;
                    const valSpan = sliderValueMap.get(dxSlider.id);
                    if (valSpan) valSpan.textContent = formatValue('text_pos_x', nextX);
                }
                if(dySlider) {
                    dySlider.value = nextY;
                    const valSpan = sliderValueMap.get(dySlider.id);
                    if (valSpan) valSpan.textContent = formatValue('text_pos_y', nextY);
                }
            }

            draw();
            scheduleAutoSave();
        });

        window.addEventListener('mouseup', function() {
            dragTarget = null;
        });

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (img.src) ctx.drawImage(img, 0, 0);
            if (!W || !H || !currentConfig || !currentApproach) return;

            const Cx = W / 2.0, Cy = H / 2.0;
            const approach = currentApproach;
            const cfg = currentConfig[approach];
            if (!cfg) return;

            const n_lanes = cfg.lanes || 1;
            const lane_w_ratio = cfg.lane_w_ratio || 0.05;
            const xOffset  = W * (cfg.x_offset_ratio || 0);
            const yOffset  = H * (cfg.y_offset_ratio || 0);
            const groupCx  = Cx + xOffset;
            const groupCy  = Cy + yOffset;
            const rotation = (cfg.text_rotation || 0) * Math.PI / 180;

            const laneFontSize = Math.max(10, W * (cfg.lane_font_size_ratio || 0.05));
            ctx.font = `bold ${laneFontSize}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.strokeStyle = "rgba(0,0,0,0.6)";
            ctx.lineWidth = 3;

            ctx.save();
            ctx.translate(groupCx, groupCy);
            ctx.rotate(rotation);
            for (let laneIdx = 1; laneIdx <= n_lanes; laneIdx++) {
                const rx = -(laneIdx - (n_lanes + 1) / 2.0) * W * lane_w_ratio;
                const ry = 0.0;
                ctx.strokeText(laneIdx, rx, ry);
                ctx.fillText(laneIdx, rx, ry);
            }
            ctx.restore();

            const textFontSize = Math.max(10, W * (cfg.text_font_size_ratio || 0.05));
            ctx.font = `bold ${textFontSize}px Arial`;
            const tx = W * (cfg.text_pos_x || 0.5);
            const ty = H * (cfg.text_pos_y || 0.05);

            const is_upstream = approach.startsWith("upstream_");
            const dir_long = approach.replace("upstream_", "");
            const type_str = is_upstream ? "Upstream" : "Downstream";

            const line1 = `Approach: ${dir_long}`;
            const line2 = `Type: ${type_str}`;

            ctx.strokeText(line1, tx, ty - textFontSize * 0.6);
            ctx.fillText(line1, tx, ty - textFontSize * 0.6);
            ctx.strokeText(line2, tx, ty + textFontSize * 0.6);
            ctx.fillText(line2, tx, ty + textFontSize * 0.6);
        }

        document.getElementById('saveBtn').addEventListener('click', async function() {
            scheduleAutoSave();
        });

        if (location.protocol === 'file:') {
            const banner = document.createElement('div');
            banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;padding:10px 16px;z-index:9999;';
            banner.innerHTML = '请先启动服务器：python scripts/watermark_server.py，然后在浏览器访问 http://localhost:8085';
            document.body.prepend(banner);
        }
</script>
</body>
</html>
